version: "3.9"

services:

  # ------------------------
  # FRONTEND (NGINX)
  # ------------------------
  frontend:
    build: ./frontend

    container_name: frontend

    restart: unless-stopped

    ports:
      - "80:80"

    depends_on:
      - backend

    networks:
      - employee-network


  # ------------------------
  # BACKEND (FLASK)
  # ------------------------
  backend:
    build: ./backend

    container_name: backend

    restart: unless-stopped

    depends_on:
      database:
        condition: service_healthy

    env_file:
      - ./backend/.env

    ports:
      - "5000:5000"

    networks:
      - employee-network


  # ------------------------
  # DATABASE (POSTGRES)
  # ------------------------
  database:
    image: postgres:17

    container_name: database

    restart: unless-stopped

    environment:
      POSTGRES_DB: employees
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin123

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d employees"]
      interval: 10s
      timeout: 5s
      retries: 5

    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql

    networks:
      - employee-network


# ------------------------
# VOLUMES
# ------------------------
volumes:
  postgres-data:


# ------------------------
# NETWORK
# ------------------------
networks:
  employee-network:
    driver: bridge
