version: "3.9"

services:

  backend:
    build: ./backend

    depends_on:
      - database

    env_file:
      - ./backend/.env

    ports:
      - "5000:5000"


  database:
    image: postgres:17

    environment:
      POSTGRES_DB: employees
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin123

    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql


volumes:
  postgres-data:
